    Experience:
      - company: Purdue University
        position: Research Assistant, NSF PFI Project Underground Pipe Mapping for Safe Excavation
        location: West Lafayette, IN
        start_date: 2022-06
        end_date: 2024-12
        highlights:
          - Developed algorithms for GPR-based 3D pipe mapping, including uncertainty quantification for pipe localization and orientation, multi-hyperbolic signature detection and tracking, and radargram decluttering.
          - Designed a graph neural network based utility network completion method using ground features, anchor points, and partial maps to infer missing pipeline segments and enhance subsurface digital twins.
          - Engineered a construction excavator digital twin for safety, including IMU-based excavator arm motion replication, digital terrain visualization, and object-motion simulations in Unity 3D.
          - Led more than 100 stakeholder interviews with utility owners, surveyors, and contractors to design and validate a practical business model.

      - company: Purdue University
        position: Research Assistant, INDOT and SCDOT Risk-based Inspection Project
        location: West Lafayette, IN
        start_date: 2018-01
        end_date: 2025-05
        highlights:
          - Designed surveys for construction-activity risk assessment.
          - Converted standard specifications into structured inspection checklists.
          - Developed a risk-based construction inspection system using Microsoft Access.
          - Collaborated on a web-based digital inspection training system.

      - company: Purdue University
        position: Teaching Assistant
        location: West Lafayette, IN
        start_date: 2018-01
        end_date: 2025-05
        highlights:
          - Computer Applications in Construction.
          - Life Cycle Engineering and Management of Constructed Facilities.
          - Practical Applications for Construction Engineering.

      - company: United Construction Management (Beijing) Consulting Co., Ltd.
        position: Intern
        location: Beijing, China
        start_date: 2016-08
        end_date: 2016-12
        highlights:
          - Performed forensic construction delay analysis using BIM to support project dispute resolution.
          - Developed a coding system to improve project documentation.

